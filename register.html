<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Darbhanga Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="font-sans">
    
    <nav style="background: #0f172a; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid rgba(148,163,184,0.15);">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0.85rem 1.5rem; display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 14px;">
                <div style="width: 48px; height: 48px; background: linear-gradient(135deg, #06b6d4, #0891b2); border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                    <span style="color: white; font-weight: 800; font-size: 1.1rem; letter-spacing: 1px;">DC</span>
                </div>
                <div>
                    <div style="font-size: 1.5rem; font-weight: 800; color: #3b82f6; line-height: 1.2; letter-spacing: -0.5px;">DarbhangaConnect</div>
                    <div style="font-size: 0.85rem; color: #94a3b8; font-weight: 500;">Professional Home Services</div>
                </div>
            </div>
            <button onclick="window.location.href='login.html'" style="color: #94a3b8; font-size: 0.9rem; background: none; border: none; cursor: pointer;">
                ← Back to Login
            </button>
        </div>
    </nav>

    <main class="container mx-auto p-6 max-w-md mt-10">
        
        <div class="rounded-3xl p-8" style="background:rgba(30,41,59,0.95);border:1px solid rgba(148,163,184,0.3);box-shadow:0 8px 32px rgba(6,182,212,0.1);">
            <div class="text-center mb-8">
                <div class="text-4xl mb-4">📝</div>
                <h2 class="text-2xl font-bold text-white mb-2">Create Account</h2>
                <p class="text-slate-300">Join DarbhangaConnect today</p>
            </div>

            <!-- Registration Form -->
            <form id="registerForm" class="space-y-6">
                
                <!-- Full Name -->
                <div>
                    <label for="fullName" class="block text-sm font-semibold text-slate-200 mb-2">
                        Full Name
                    </label>
                    <input 
                        type="text" 
                        id="fullName" 
                        name="fullName" 
                        required 
                        placeholder="Enter your full name" 
                        class="block w-full px-3 py-3 rounded-xl text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 sm:text-sm" style="background:rgba(51,65,85,0.8);border:1px solid rgba(148,163,184,0.3);"
                    >
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-200 mb-2">
                        Email Address
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required 
                        placeholder="Enter your email" 
                        class="block w-full px-3 py-3 rounded-xl text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 sm:text-sm" style="background:rgba(51,65,85,0.8);border:1px solid rgba(148,163,184,0.3);"
                    >
                </div>

                <!-- Phone Number -->
                <div>
                    <label for="phone" class="block text-sm font-semibold text-slate-200 mb-2">
                        Phone Number
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="text-gray-500 sm:text-sm">+91</span>
                        </div>
                        <input 
                            type="tel" 
                            id="phone" 
                            name="phone" 
                            pattern="[6-9][0-9]{9}" 
                            required 
                            placeholder="Enter 10 digit number" 
                            class="block w-full pl-12 pr-3 py-3 rounded-xl text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 sm:text-sm" style="background:rgba(51,65,85,0.8);border:1px solid rgba(148,163,184,0.3);"
                        >
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-200 mb-2">
                        Password
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        minlength="6"
                        placeholder="Create a password (min 6 characters)" 
                        class="block w-full px-3 py-3 rounded-xl text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 sm:text-sm" style="background:rgba(51,65,85,0.8);border:1px solid rgba(148,163,184,0.3);"
                    >
                </div>

                <!-- Confirm Password -->
                <div>
                    <label for="confirmPassword" class="block text-sm font-semibold text-slate-200 mb-2">
                        Confirm Password
                    </label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        required 
                        placeholder="Confirm your password" 
                        class="block w-full px-3 py-3 rounded-xl text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 sm:text-sm" style="background:rgba(51,65,85,0.8);border:1px solid rgba(148,163,184,0.3);"
                    >
                </div>

                <!-- Terms & Conditions -->
                <div class="flex items-center">
                    <input id="terms" name="terms" type="checkbox" required class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                    <label for="terms" class="ml-2 block text-sm text-slate-300">
                        I agree to the <a href="#" class="text-blue-600 hover:text-blue-500">Terms & Conditions</a> and <a href="#" class="text-blue-600 hover:text-blue-500">Privacy Policy</a>
                    </label>
                </div>

                <!-- Register Button -->
                <button type="submit" 
                        class="liquid-button w-full py-3 rounded-xl font-semibold">
                    Create Account
                </button>

            </form>

            <!-- Login Link -->
            <div class="mt-6 text-center">
                <p class="text-sm text-slate-300">
                    Already have an account? 
                    <button onclick="window.location.href='login.html'" class="text-cyan-400 hover:text-cyan-300 font-semibold">
                        Sign in here
                    </button>
                </p>
            </div>

        </div>
        
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('registerForm').addEventListener('submit', handleRegistration);
            
            // Real-time validation
            document.getElementById('phone').addEventListener('input', validatePhone);
            document.getElementById('confirmPassword').addEventListener('input', validatePasswordMatch);
        });

        function handleRegistration(event) {
            event.preventDefault();
            
            const formData = {
                fullName: document.getElementById('fullName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('confirmPassword').value
            };

            // Validation
            if (!validateForm(formData)) {
                return;
            }

            // Show loading state
            const submitBtn = event.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="animate-spin">⏳</span> Creating Account...';
            submitBtn.disabled = true;

            // Simulate API call
            setTimeout(() => {
                // Store user data (in production, this would be sent to backend)
                const userData = {
                    id: Date.now(),
                    fullName: formData.fullName,
                    email: formData.email,
                    phone: formData.phone,
                    role: 'customer',
                    registrationDate: new Date().toISOString()
                };

                // Store in localStorage (demo purposes)
                const existingUsers = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
                existingUsers.push(userData);
                localStorage.setItem('registeredUsers', JSON.stringify(existingUsers));

                showNotification('✅ Account created successfully! Redirecting to login...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            }, 1500);
        }

        function validateForm(data) {
            // Check email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(data.email)) {
                showNotification('❌ Please enter a valid email address', 'error');
                return false;
            }

            // Check if passwords match
            if (data.password !== data.confirmPassword) {
                showNotification('❌ Passwords do not match', 'error');
                return false;
            }

            // Check password strength
            if (data.password.length < 6) {
                showNotification('❌ Password must be at least 6 characters', 'error');
                return false;
            }

            // Check phone number
            if (!isValidPhone(data.phone)) {
                showNotification('❌ Please enter a valid 10-digit phone number', 'error');
                return false;
            }

            // Check if user already exists (demo check)
            const existingUsers = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            const emailExists = existingUsers.some(user => user.email === data.email);
            const phoneExists = existingUsers.some(user => user.phone === data.phone);

            if (emailExists) {
                showNotification('❌ Email already registered', 'error');
                return false;
            }

            if (phoneExists) {
                showNotification('❌ Phone number already registered', 'error');
                return false;
            }

            return true;
        }

        function validatePhone() {
            const phoneInput = document.getElementById('phone');
            phoneInput.value = phoneInput.value.replace(/\D/g, '').slice(0, 10);
            
            if (phoneInput.value.length === 10 && isValidPhone(phoneInput.value)) {
                phoneInput.classList.remove('border-red-300');
                phoneInput.classList.add('border-green-300');
            } else {
                phoneInput.classList.remove('border-green-300');
                phoneInput.classList.add('border-red-300');
            }
        }

        function validatePasswordMatch() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const confirmInput = document.getElementById('confirmPassword');
            
            if (confirmPassword && password === confirmPassword) {
                confirmInput.classList.remove('border-red-300');
                confirmInput.classList.add('border-green-300');
            } else if (confirmPassword) {
                confirmInput.classList.remove('border-green-300');
                confirmInput.classList.add('border-red-300');
            }
        }

        function isValidPhone(phone) {
            const phoneRegex = /^[6-9]\d{9}$/;
            return phoneRegex.test(phone);
        }

        function showNotification(message, type = 'info') {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            
            const notification = document.createElement('div');
            notification.className = `notification fixed top-20 right-4 z-50 p-4 rounded-lg shadow-lg max-w-sm transform transition-all duration-300`;
            
            if (type === 'success') {
                notification.classList.add('bg-green-500', 'text-white');
            } else if (type === 'error') {
                notification.classList.add('bg-red-500', 'text-white');
            } else {
                notification.classList.add('bg-blue-500', 'text-white');
            }
            
            notification.innerHTML = `
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium">${message}</span>
                    <button onclick="this.parentElement.parentElement.remove()" class="ml-2 text-white hover:text-gray-200">×</button>
                </div>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                if (notification.parentElement) {
                    notification.remove();
                }
            }, 5000);
        }
    </script>

</body>
</html>
