<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darbhanga Connect | Local Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="page_2.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="font-sans">

    <nav style="background: #0f172a; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid rgba(148,163,184,0.15);">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0.85rem 1.5rem; display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 14px;">
                <button onclick="goBack()" style="color: #94a3b8; margin-right: 4px;">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>
                <div style="width: 48px; height: 48px; background: linear-gradient(135deg, #06b6d4, #0891b2); border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                    <span style="color: white; font-weight: 800; font-size: 1.1rem; letter-spacing: 1px;">DC</span>
                </div>
                <div>
                    <div style="font-size: 1.5rem; font-weight: 800; color: #3b82f6; line-height: 1.2; letter-spacing: -0.5px;">DarbhangaConnect</div>
                    <div style="font-size: 0.85rem; color: #94a3b8; font-weight: 500;">Professional Home Services</div>
                </div>
            </div>
            <div id="total-display" style="background: rgba(51,65,85,0.6); border: 1px solid rgba(148,163,184,0.3); color: #e2e8f0; padding: 0.5rem 1rem; border-radius: 9999px; font-weight: bold; font-size: 0.875rem;">
                Total: ₹0
            </div>
        </div>
    </nav>

    <!-- Liquid Header -->
    <header class="text-white py-16 px-6 text-center relative">
        <div class="liquid-container rounded-3xl p-8 mx-auto max-w-2xl">
            <h2 class="text-3xl font-bold mb-4 text-slate-100">Need a Repair in Darbhanga?</h2>
            <p class="text-slate-300 text-lg">Verified Plumbers & Electricians in 30 Mins</p>
        </div>
    </header>

    <main class="container mx-auto p-6">
        <h3 class="font-bold text-slate-100 mb-8 text-2xl text-center">Select Service:</h3>
        
        <!-- Liquid Service Grid -->
        <div class="grid grid-cols-2 gap-6 mb-12">
            <button onclick="selectService('Electrician', 150, this)" class="service-card p-8 text-center">
                <span class="text-4xl mb-4 block">⚡</span>
                <p class="font-bold text-slate-100 text-lg mb-2">Electrician</p>
                <p class="text-sm text-slate-300">Starts @ ₹150</p>
            </button>
            
            <button onclick="selectService('Plumber', 120, this)" class="service-card p-8 text-center">
                <span class="text-4xl mb-4 block">🚰</span>
                <p class="font-bold text-slate-100 text-lg mb-2">Plumber</p>
                <p class="text-sm text-slate-300">Starts @ ₹120</p>
            </button>
            
            <button onclick="selectService('Bike Mechanic', 120, this)" class="service-card p-8 text-center">
                <span class="text-4xl mb-4 block">⚙️</span>
                <p class="font-bold text-slate-100 text-lg mb-2">Bike Mechanic</p>
                <p class="text-sm text-slate-300">Starts @ ₹120</p>
            </button>
            
            <button onclick="selectService('Car Mechanic', 200, this)" class="service-card p-8 text-center">
                <span class="text-4xl mb-4 block">🚗</span>
                <p class="font-bold text-slate-100 text-lg mb-2">Car Mechanic</p>
                <p class="text-sm text-slate-300">Starts @ ₹200</p>
            </button>
            
            <button onclick="selectService('AC Technician', 180, this)" class="service-card p-8 text-center">
                <span class="text-4xl mb-4 block">❄️</span>
                <p class="font-bold text-slate-100 text-lg mb-2">AC Technician</p>
                <p class="text-sm text-slate-300">Starts @ ₹180</p>
            </button>
            
            <button onclick="selectService('Labour Mistri', 100, this)" class="service-card p-8 text-center">
                <span class="text-4xl mb-4 block">👷</span>
                <p class="font-bold text-slate-100 text-lg mb-2">Labour Mistri</p>
                <p class="text-sm text-slate-300">Starts @ ₹100</p>
            </button>
            
            <button onclick="selectService('Mobile Repair', 120, this)" class="service-card p-8 text-center">
                <span class="text-4xl mb-4 block">📱</span>
                <p class="font-bold text-slate-100 text-lg mb-2">Mobile Repair</p>
                <p class="text-sm text-slate-300">Starts @ ₹120</p>
            </button>
            
            <button onclick="selectService('Cleaning', 120, this)" class="service-card p-8 text-center">
                <span class="text-4xl mb-4 block">🧹</span>
                <p class="font-bold text-slate-100 text-lg mb-2">Cleaning</p>
                <p class="text-sm text-slate-300">Starts @ ₹120</p>
            </button>
            
            <button onclick="selectService('Carpenter', 150, this)" class="service-card p-8 text-center">
                <span class="text-4xl mb-4 block">🪚</span>
                <p class="font-bold text-slate-100 text-lg mb-2">Carpenter</p>
                <p class="text-sm text-slate-300">Starts @ ₹150</p>
            </button>
            
            <button onclick="selectService('Painter', 130, this)" class="service-card p-8 text-center">
                <span class="text-4xl mb-4 block">🎨</span>
                <p class="font-bold text-slate-100 text-lg mb-2">Painter</p>
                <p class="text-sm text-slate-300">Starts @ ₹130</p>
            </button>
            
            <button onclick="selectService('Gardener', 110, this)" class="service-card p-8 text-center">
                <span class="text-4xl mb-4 block">🌱</span>
                <p class="font-bold text-slate-100 text-lg mb-2">Gardener</p>
                <p class="text-sm text-slate-300">Starts @ ₹110</p>
            </button>
            
            <button onclick="selectService('Pest Control', 200, this)" class="service-card p-8 text-center">
                <span class="text-4xl mb-4 block">🐛</span>
                <p class="font-bold text-slate-100 text-lg mb-2">Pest Control</p>
                <p class="text-sm text-slate-300">Starts @ ₹200</p>
            </button>
            
            <button onclick="selectService('Water Tank Cleaning', 300, this)" class="service-card p-8 text-center">
                <span class="text-4xl mb-4 block">🚰</span>
                <p class="font-bold text-slate-100 text-lg mb-2">Water Tank Cleaning</p>
                <p class="text-sm text-slate-300">Starts @ ₹300</p>
            </button>
            
            <button onclick="selectService('Appliance Repair', 180, this)" class="service-card p-8 text-center">
                <span class="text-4xl mb-4 block">🔌</span>
                <p class="font-bold text-slate-100 text-lg mb-2">Appliance Repair</p>
                <p class="text-sm text-slate-300">Starts @ ₹180</p>
            </button>
            
            <button onclick="selectService('Solar Technician', 250, this)" class="service-card p-8 text-center">
                <span class="text-4xl mb-4 block">☀️</span>
                <p class="font-bold text-slate-100 text-lg mb-2">Solar Technician</p>
                <p class="text-sm text-slate-300">Starts @ ₹250</p>
            </button>
            
            <button onclick="selectService('Beauty Services', 200, this)" class="service-card p-8 text-center">
                <span class="text-4xl mb-4 block">💄</span>
                <p class="font-bold text-slate-100 text-lg mb-2">Beauty Services</p>
                <p class="text-sm text-slate-300">Starts @ ₹200</p>
            </button>
        </div>

        <!-- Liquid Booking Form -->
        <section id="booking-form" class="rounded-3xl p-8 shadow-2xl" style="background:rgba(30,41,59,0.95);border:1px solid rgba(148,163,184,0.3);">
            <h4 class="font-bold text-2xl mb-8 text-slate-100 text-center">Booking Details</h4>

            <div class="mb-6">
                <label for="full-name" class="block text-sm font-semibold text-slate-200 mb-3">
                    Full Name
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                    <input 
                        type="text" 
                        id="full-name" 
                        name="full-name" 
                        required 
                        placeholder="e.g. Rahul Kumar" 
                        class="form-input block w-full pl-12 pr-4 py-4 rounded-2xl text-slate-100 placeholder-slate-400 focus:outline-none" style="background:rgba(51,65,85,0.8);border:1px solid rgba(148,163,184,0.3);"
                    >
                </div>
            </div>

            <div class="mb-8">
                <label for="phone" class="block text-sm font-semibold text-slate-200 mb-3">
                    Mobile Number (for Confirmation)
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span class="text-gray-500 sm:text-sm">+91</span>
                    </div>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        pattern="[6-9][0-9]{9}" 
                        required 
                        placeholder="Enter 10 digit number" 
                        class="form-input block w-full pl-16 pr-4 py-4 rounded-2xl text-slate-100 placeholder-slate-400 focus:outline-none" style="background:rgba(51,65,85,0.8);border:1px solid rgba(148,163,184,0.3);"
                    >
                </div>
                <p class="mt-3 text-sm text-slate-400">Our team will call you on this number in 5 minutes.</p>
            </div>
            
            <div class="mb-6">
                <label class="block text-sm font-semibold text-slate-200 mb-3">Your Area in Darbhanga</label>
                <select id="user-area" class="form-input w-full p-4 rounded-2xl text-slate-100 focus:outline-none" style="background:rgba(51,65,85,0.8);border:1px solid rgba(148,163,184,0.3);">
                    <option value="">-- Choose Location --</option>
                    <option>Laheriasarai</option>
                    <option>Kadirabad</option>
                    <option>Donar / Station Road</option>
                    <option>Tower Chowk</option>
                    <option>Darbhanga Tower</option>
                </select>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-semibold text-slate-200 mb-3">Full Address / Landmark</label>
                <input type="text" id="user-address" placeholder="e.g. Ward No. 5, Near Mirza Ghalib Road" 
                       class="form-input w-full p-4 rounded-2xl text-slate-100 placeholder-slate-400 focus:outline-none" style="background:rgba(51,65,85,0.8);border:1px solid rgba(148,163,184,0.3);">
            </div>
            
            <button onclick="sendToWhatsApp()" class="liquid-button w-full py-5 text-lg font-bold flex justify-center items-center gap-3">
                <span>Proceed to Payment</span>
            </button>
        </section>
    </main>

</body>
</html>
