<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - Darbhanga Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="font-sans">
    
    <nav style="background: #0f172a; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid rgba(148,163,184,0.15);">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0.85rem 1.5rem; display: flex; align-items: center; gap: 14px;">
            <div style="width: 48px; height: 48px; background: linear-gradient(135deg, #06b6d4, #0891b2); border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                <span style="color: white; font-weight: 800; font-size: 1.1rem; letter-spacing: 1px;">DC</span>
            </div>
            <div>
                <div style="font-size: 1.5rem; font-weight: 800; color: #3b82f6; line-height: 1.2; letter-spacing: -0.5px;">DarbhangaConnect</div>
                <div style="font-size: 0.85rem; color: #94a3b8; font-weight: 500;">Professional Home Services</div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6 max-w-md">
        
        <div class="liquid-container rounded-3xl p-8 text-center">
            <div id="success-icon" class="text-6xl mb-4">✅</div>
            <h2 id="main-title" class="text-2xl font-bold text-green-400 mb-2">Booking Confirmed!</h2>
            <p id="main-subtitle" class="text-slate-300 mb-6">Your service request has been processed successfully.</p>
            
            <!-- Payment Status -->
            <div id="payment-status" class="mb-6">
                <!-- Will be populated by JavaScript -->
            </div>
            
            <div class="glass-effect rounded-xl p-4 mb-6 text-left">
                <h3 class="font-bold text-slate-200 mb-3">Booking Details:</h3>
                <div id="booking-details" class="space-y-2 text-sm">
                    <!-- Details will be populated by JavaScript -->
                </div>
            </div>
            
            <div id="next-steps" class="rounded-xl p-4 mb-6" style="background:rgba(51,65,85,0.5);border:1px solid rgba(148,163,184,0.2);">
                <h4 class="font-bold text-slate-100 mb-2">What's Next?</h4>
                <ul id="steps-list" class="text-sm text-slate-300 space-y-1">
                    <!-- Will be populated by JavaScript -->
                </ul>
            </div>
            
            <div class="space-y-3">
                <button onclick="window.location.href='index.html'" 
                        class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition">
                    Book Another Service
                </button>
                
                <button onclick="callSupport()" 
                        class="w-full bg-green-600 text-white py-3 rounded-xl font-semibold hover:bg-green-700 transition">
                    📞 Call Support
                </button>
                
                <button onclick="window.location.href='admin.html'" 
                        class="w-full bg-gray-600 text-white py-3 rounded-xl font-semibold hover:bg-gray-700 transition text-sm">
                    View All Bookings (Admin)
                </button>
            </div>
        </div>
        
    </main>
    <script>
        // Display booking details from localStorage
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const isPaid = urlParams.get('paid') === 'true';
            
            const bookings = JSON.parse(localStorage.getItem('darbhangaBookings') || '[]');
            const latestBooking = bookings[bookings.length - 1];
            
            if (latestBooking) {
                displayBookingDetails(latestBooking, isPaid);
                updatePageContent(latestBooking, isPaid);
            }
        });
        
        function displayBookingDetails(booking, isPaid) {
            const detailsDiv = document.getElementById('booking-details');
            let paymentInfo = '';
            
            if (isPaid && booking.paymentId) {
                paymentInfo = `<div><strong>Payment ID:</strong> ${booking.paymentId}</div>`;
            }
            
            detailsDiv.innerHTML = `
                <div><strong>Booking ID:</strong> ${booking.bookingId || 'DC' + Date.now().toString().slice(-6)}</div>
                <div><strong>Service:</strong> ${booking.service}</div>
                <div><strong>Customer:</strong> ${booking.name}</div>
                <div><strong>Phone:</strong> +91 ${booking.phone}</div>
                <div><strong>Area:</strong> ${booking.area}</div>
                <div><strong>Address:</strong> ${booking.address}</div>
                <div><strong>Amount:</strong> ₹${booking.paidAmount || booking.price}</div>
                ${paymentInfo}
                <div><strong>Status:</strong> <span class="${isPaid ? 'text-green-600' : 'text-orange-600'}">${isPaid ? 'Paid' : 'Payment Pending'}</span></div>
            `;
        }
        
        function updatePageContent(booking, isPaid) {
            if (isPaid) {
                // Paid booking
                document.getElementById('success-icon').textContent = '🎉';
                document.getElementById('main-title').innerHTML = 'Payment Successful!';
                document.getElementById('main-subtitle').innerHTML = 'Thank you for your payment. You will receive priority service.';
                
                document.getElementById('payment-status').innerHTML = `
                    <div class="bg-green-100 border border-green-300 rounded-xl p-4">
                        <div class="flex items-center gap-2">
                            <span class="text-green-600 text-xl">💳</span>
                            <div>
                                <div class="font-bold text-green-800">Payment Completed</div>
                                <div class="text-sm text-green-700">Amount: ₹${booking.paidAmount} (10% discount applied)</div>
                            </div>
                        </div>
                    </div>
                `;
                
                document.getElementById('steps-list').innerHTML = `
                    <li>• ⚡ Priority service activated</li>
                    <li>• 📞 Our team will call you within 2 minutes</li>
                    <li>• 🚀 Technician will arrive in 20-30 minutes</li>
                    <li>• 📧 Payment receipt sent to your phone</li>
                `;
            } else {
                // Unpaid booking
                document.getElementById('payment-status').innerHTML = `
                    <div class="bg-orange-100 border border-orange-300 rounded-xl p-4">
                        <div class="flex items-center gap-2">
                            <span class="text-orange-600 text-xl">💰</span>
                            <div>
                                <div class="font-bold text-orange-800">Payment Pending</div>
                                <div class="text-sm text-orange-700">Pay ₹${booking.price} in cash after service</div>
                            </div>
                        </div>
                    </div>
                `;
                
                document.getElementById('steps-list').innerHTML = `
                    <li>• 📞 Our team will call you within 5 minutes</li>
                    <li>• 🔧 Technician will arrive in 30-45 minutes</li>
                    <li>• 💰 Pay ₹${booking.price} after service completion</li>
                    <li>• ⭐ Rate your experience</li>
                `;
            }
        }
        
        function callSupport() {
            window.open('tel:+917903628761');
        }
    </script>

</body>
</html>
