<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Darbhanga Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="font-sans">
    
    <nav style="background: #0f172a; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid rgba(148,163,184,0.15);">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0.85rem 1.5rem; display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 14px;">
                <div style="width: 48px; height: 48px; background: linear-gradient(135deg, #06b6d4, #0891b2); border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                    <span style="color: white; font-weight: 800; font-size: 1.1rem; letter-spacing: 1px;">DC</span>
                </div>
                <div>
                    <div style="font-size: 1.5rem; font-weight: 800; color: #3b82f6; line-height: 1.2; letter-spacing: -0.5px;">DarbhangaConnect</div>
                    <div style="font-size: 0.85rem; color: #94a3b8; font-weight: 500;">Professional Home Services</div>
                </div>
            </div>
            <button onclick="window.location.href='index.html'" style="color: #94a3b8; font-size: 0.9rem; background: none; border: none; cursor: pointer;">
                ← Back to Home
            </button>
        </div>
    </nav>

    <main class="container mx-auto p-6 max-w-md mt-10">
        
        <div class="rounded-3xl p-8" style="background: rgba(30,41,59,0.95); border: 1px solid rgba(148,163,184,0.3); box-shadow: 0 8px 32px rgba(6,182,212,0.1);">
            <div class="text-center mb-8">
                <div class="text-4xl mb-4">🔐</div>
                <h2 class="text-2xl font-bold text-white mb-2">Welcome Back</h2>
                <p class="text-slate-300">Sign in to your account</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="space-y-6">
                
                <!-- Email/Phone Input -->
                <div>
                    <label for="loginId" class="block text-sm font-semibold text-slate-200 mb-2">
                        Email or Phone Number
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path>
                            </svg>
                        </div>
                        <input 
                            type="text" 
                            id="loginId" 
                            name="loginId" 
                            required 
                            placeholder="Enter email or phone number" 
                            class="block w-full pl-10 pr-3 py-3 rounded-xl text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 sm:text-sm"
                            style="background: rgba(51,65,85,0.8); border: 1px solid rgba(148,163,184,0.3);"
                        >
                    </div>
                </div>

                <!-- Password Input -->
                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-200 mb-2">
                        Password
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </div>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required 
                            placeholder="Enter your password" 
                            class="block w-full pl-10 pr-12 py-3 rounded-xl text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 sm:text-sm"
                            style="background: rgba(51,65,85,0.8); border: 1px solid rgba(148,163,184,0.3);"
                        >
                        <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-3 flex items-center">
                            <svg id="eyeIcon" class="h-5 w-5 text-slate-400 hover:text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="rememberMe" name="rememberMe" type="checkbox" class="h-4 w-4 text-cyan-500 focus:ring-cyan-500 border-slate-500 rounded">
                        <label for="rememberMe" class="ml-2 block text-sm text-slate-300">
                            Remember me
                        </label>
                    </div>
                    <button type="button" onclick="forgotPassword()" class="text-sm text-cyan-400 hover:text-cyan-300">
                        Forgot password?
                    </button>
                </div>

                <!-- Login Button -->
                <button type="submit" class="liquid-button w-full py-3 rounded-xl font-semibold">
                    Sign In
                </button>

            </form>

            <!-- Divider -->
            <div class="mt-6 mb-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-600"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 text-slate-400" style="background: rgba(30,41,59,0.95);">Or</span>
                    </div>
                </div>
            </div>

            <!-- Register Link -->
            <div class="text-center">
                <p class="text-sm text-slate-300">
                    Don't have an account? 
                    <button onclick="window.location.href='register.html'" class="text-cyan-400 hover:text-cyan-300 font-semibold">
                        Sign up here
                    </button>
                </p>
            </div>

            <!-- Quick Login (Demo) -->
            <div class="mt-6 p-4 rounded-xl" style="background: rgba(51,65,85,0.5); border: 1px solid rgba(148,163,184,0.2);">
                <h4 class="text-sm font-semibold text-slate-200 mb-2">Quick Demo Login:</h4>
                <div class="space-y-2 text-xs text-slate-300">
                    <div><strong>Customer:</strong> user@demo.com / password123</div>
                    <div><strong>Admin:</strong> admin@darbhanga.com / admin123</div>
                </div>
            </div>

        </div>
        
    </main>
    <script>
        // Demo users database (in production, this would be on backend)
        const users = {
            'user@demo.com': {
                password: 'password123',
                name: 'Demo User',
                role: 'customer',
                phone: '9876543210'
            },
            'admin@darbhanga.com': {
                password: 'admin123',
                name: 'Admin User',
                role: 'admin',
                phone: '9876543210'
            },
            '9876543210': {
                password: 'password123',
                name: 'Phone User',
                role: 'customer',
                email: 'phone@demo.com'
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            // Check if user is already logged in
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                const user = JSON.parse(currentUser);
                redirectUser(user);
            }

            // Handle form submission
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
        });

        function handleLogin(event) {
            event.preventDefault();
            
            const loginId = document.getElementById('loginId').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            // Show loading state
            const submitBtn = event.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="animate-spin">⏳</span> Signing in...';
            submitBtn.disabled = true;

            // Simulate API call delay
            setTimeout(() => {
                if (authenticateUser(loginId, password)) {
                    const user = users[loginId];
                    const userData = {
                        loginId: loginId,
                        name: user.name,
                        role: user.role,
                        phone: user.phone || loginId,
                        email: user.email || loginId,
                        loginTime: new Date().toISOString(),
                        rememberMe: rememberMe
                    };

                    // Store user session
                    if (rememberMe) {
                        localStorage.setItem('currentUser', JSON.stringify(userData));
                    } else {
                        sessionStorage.setItem('currentUser', JSON.stringify(userData));
                    }

                    showNotification('✅ Login successful! Redirecting...', 'success');
                    
                    setTimeout(() => {
                        redirectUser(userData);
                    }, 1500);

                } else {
                    showNotification('❌ Invalid email/phone or password', 'error');
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            }, 1000);
        }

        function authenticateUser(loginId, password) {
            const user = users[loginId];
            return user && user.password === password;
        }

        function redirectUser(user) {
            if (user.role === 'admin') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'index.html';
            }
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21"></path>
                `;
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                `;
            }
        }

        function forgotPassword() {
            const email = prompt('Enter your email address to reset password:');
            if (email) {
                showNotification('📧 Password reset link sent to your email!', 'success');
            }
        }

        function showNotification(message, type = 'info') {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            
            const notification = document.createElement('div');
            notification.className = `notification fixed top-20 right-4 z-50 p-4 rounded-lg shadow-lg max-w-sm transform transition-all duration-300`;
            
            if (type === 'success') {
                notification.classList.add('bg-green-500', 'text-white');
            } else if (type === 'error') {
                notification.classList.add('bg-red-500', 'text-white');
            } else {
                notification.classList.add('bg-blue-500', 'text-white');
            }
            
            notification.innerHTML = `
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium">${message}</span>
                    <button onclick="this.parentElement.parentElement.remove()" class="ml-2 text-white hover:text-gray-200">×</button>
                </div>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                if (notification.parentElement) {
                    notification.remove();
                }
            }, 5000);
        }
    </script>

</body>
</html>
